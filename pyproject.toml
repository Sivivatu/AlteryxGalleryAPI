[project]
name = "alteryxgalleryapi"
authors = [
    {name = "Paul Houghton", email = "paul.houghton@theinformationlab.co.uk"}
]
version = "0.1.0"
description = "An API for connecting to an Alteryx Gallery. Forked from the project by DAVID PRYOR, NICK SIMMONS, AND RITU GOWLIKAR"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
# packages = [
#     { include = "AlteryxGallery", from = "src" },
# ]
# repository = "https://github.com/Sivivatu/AlteryxGalleryAPI"
keywords = ["Alteryx Server", "Atleryx Gallery", "API", "Alteryx Gallery API", "Alteryx Server API", "Alteryx API"]

dependencies = [
    "python-dotenv>=1.0.1",
    "requests>=2.32.3",
]

[dependency-groups]
dev = [
    "pytest>=8.3.3",
    "ruff>=0.8.0",
]

[tool.pytest.ini_options]
# addopts = "--cov=AlteryxGallery --cov-report=term-missing"
pythonpath = ["src"]
testpaths = ["tests"]
